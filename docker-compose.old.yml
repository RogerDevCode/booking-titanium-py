# ============================================================================
# PRODUCTION-GRADE DOCKER COMPOSE FOR BOOKING SYSTEM (FASTAPI + ARQ)
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${LOG_MAX_SIZE:-20m}"
    max-file: "${LOG_MAX_FILE:-10}"
    compress: "true"

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off -c random_page_cost=1.1
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M
    environment:
      - POSTGRES_PASSWORD=booking
      - POSTGRES_USER=booking
      - POSTGRES_DB=booking
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    ports:
      - 8080:80
    environment:
      - BASE_URL=":80"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/monitoring/metrics",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      telegram_gateway_api:
        condition: service_healthy
    logging: *default-logging

  cloudflared:
    container_name: cloudflared_tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      caddy:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging: *default-logging
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  telegram_gateway_api:
    build:
      context: .
      dockerfile: Dockerfile.ai-agent
    restart: unless-stopped
    command: ["/app/.venv/bin/uvicorn", "f.telegram_gateway.app:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    expose:
      - 8000
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/monitoring/metrics\")'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  telegram_gateway_worker:
    build:
      context: .
      dockerfile: Dockerfile.ai-agent
    restart: unless-stopped
    command: ["/app/.venv/bin/arq", "f.telegram_gateway.worker.WorkerSettings"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; exit(0)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

volumes:
  db_data: null
  caddy_data: null
